<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💝 Untuk Jelita Tersayang 💝</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & BASE - 120FPS OPTIMIZED ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Montserrat', sans-serif;
            background: #000;
        }
        
        /* ===== LANDING PAGE - FULLSCREEN ===== */
        .landing-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ff6b9d, #ff1493 70%, #8b0a50);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            will-change: opacity;
            transform: translateZ(0);
        }
        
        /* ===== FLOATING HEARTS BACKGROUND ===== */
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            transform: translateZ(0);
        }
        
        .heart-particle {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-size: clamp(15px, 5vw, 30px);
            animation: floatHeart 20s linear infinite;
            will-change: transform;
            transform: translateZ(0);
        }
        
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }
        
        /* ===== MAIN CARD - FULLY RESPONSIVE ===== */
        .love-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: min(80px, 10vw);
            padding: clamp(25px, 6vw, 50px) clamp(20px, 5vw, 40px);
            max-width: min(700px, 95%);
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 min(50px, 5vw) min(100px, 10vw) rgba(255, 20, 147, 0.5),
                        0 0 0 5px rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 100;
            animation: cardFloat 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            will-change: transform;
            transform: translateZ(0);
            -webkit-overflow-scrolling: touch;
        }
        
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ===== PHOTO 3D ===== */
        .photo-wrapper {
            margin-bottom: clamp(20px, 4vw, 30px);
            position: relative;
            display: inline-block;
            width: 100%;
            text-align: center;
        }
        
        .photo-3d {
            width: min(160px, 35vw);
            height: min(160px, 35vw);
            border-radius: 50%;
            background: linear-gradient(135deg, #FFB6C1, #FF1493);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            box-shadow: 0 min(20px, 2vw) min(40px, 4vw) rgba(255,20,147,0.6);
            animation: rotate3D 10s linear infinite;
            transform-style: preserve-3d;
            will-change: transform;
        }
        
        @keyframes rotate3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        .photo-3d i {
            font-size: min(75px, 16vw);
            color: white;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            animation: heartbeat 1.5s ease-in-out infinite;
            will-change: transform;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .photo-ring {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            border-top-color: #FF1493;
            border-bottom-color: #FF69B4;
            animation: spin 6s linear infinite;
            will-change: transform;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* ===== TYPOGRAPHY - RESPONSIVE ===== */
        .greeting-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            background: linear-gradient(135deg, #FF1493, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .name-highlight {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2rem, 7vw, 3rem);
            color: #FF1493;
            display: block;
            margin: 15px 0;
            text-align: center;
            text-shadow: 3px 3px 6px rgba(255,105,180,0.3);
        }
        
        .love-message {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #5a3e3e;
            margin: 20px 0;
            line-height: 1.6;
            text-align: center;
        }
        
        .question {
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 700;
            color: #FF1493;
            margin: 20px 0;
            text-align: center;
        }
        
        /* ===== BUTTON CONTAINER - FULLSCREEN CHASE ===== */
        .button-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }
        
        /* ===== YES BUTTON - STAYS AT BOTTOM ===== */
        .btn-yes {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF1493, #FF69B4);
            color: white;
            border: none;
            padding: clamp(12px, 3.5vw, 18px) clamp(25px, 6vw, 45px);
            border-radius: 60px;
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 15px);
            box-shadow: 0 10px 30px rgba(255,20,147,0.6),
                        0 0 0 3px white;
            z-index: 1002;
            pointer-events: auto;
            min-width: min(200px, 80%);
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            border: 2px solid white;
        }
        
        .btn-yes:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .btn-yes i {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            animation: iconBeat 1s ease-in-out infinite;
            will-change: transform;
        }
        
        @keyframes iconBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* ===== NO BUTTON - FLEES EVERYWHERE ===== */
        .btn-no {
            position: fixed;
            background: linear-gradient(135deg, #808080, #A9A9A9);
            color: white;
            border: none;
            padding: clamp(12px, 3.5vw, 18px) clamp(25px, 6vw, 45px);
            border-radius: 60px;
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 15px);
            box-shadow: 0 10px 30px rgba(128,128,128,0.5),
                        0 0 0 3px white;
            z-index: 1001;
            pointer-events: none;
            min-width: min(200px, 80%);
            justify-content: center;
            transition: all 0.1s linear;
            will-change: transform, left, top;
            transform: translateZ(0);
            border: 2px solid white;
        }
        
        /* ===== TOOLTIP - RESPONSIVE ===== */
        .tooltip {
            position: fixed;
            background: white;
            padding: clamp(8px, 2.5vw, 12px) clamp(15px, 4vw, 25px);
            border-radius: 60px;
            color: #FF1493;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(255,20,147,0.4);
            border: 2px solid #FFB6C1;
            transform: translateZ(0);
            will-change: transform;
        }
        
        /* ===== DISTANCE INDICATOR - RESPONSIVE ===== */
        .distance-indicator {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            right: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 30px;
            color: white;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            z-index: 1003;
            border: 1px solid rgba(255,255,255,0.3);
            transition: background 0.2s;
            pointer-events: none;
        }
        
        /* ===== SCORE BOARD - RESPONSIVE ===== */
        .score-board {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 30px;
            color: white;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            z-index: 1003;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        
        /* ===== TRAIL EFFECT ===== */
        .trail-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #FF69B4;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            animation: trailFade 0.5s ease-out forwards;
            filter: blur(2px);
            will-change: transform, opacity;
        }
        
        @keyframes trailFade {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* ===== LOADING - RESPONSIVE ===== */
        .loading-container {
            position: fixed;
            bottom: max(100px, 20vh);
            left: 50%;
            transform: translateX(-50%);
            width: min(80%, 400px);
            display: none;
            z-index: 1004;
        }
        
        .loading-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 30px;
            overflow: hidden;
        }
        
        .loading-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFB6C1, #FF1493);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 30px;
        }
        
        .loading-text {
            color: white;
            margin-top: 10px;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* ===== FOOTER - RESPONSIVE ===== */
        .romantic-footer {
            position: fixed;
            bottom: max(80px, 15vh);
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 50px;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .romantic-footer i {
            color: #FF1493;
            font-size: clamp(0.8rem, 3vw, 1rem);
            animation: footerHeart 1.5s ease-in-out infinite;
        }
        
        @keyframes footerHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* ===== LANDSCAPE ORIENTATION FIX ===== */
        @media (orientation: landscape) and (max-height: 500px) {
            .btn-yes {
                bottom: 10px;
                padding: 8px 20px;
                font-size: 1rem;
            }
            
            .romantic-footer {
                bottom: 70px;
                padding: 5px 15px;
            }
            
            .photo-3d {
                width: 100px;
                height: 100px;
            }
            
            .love-card {
                padding: 15px;
            }
        }
        
        /* ===== DARK MODE SUPPORT ===== */
        @media (prefers-color-scheme: dark) {
            .love-card {
                background: rgba(30,30,30,0.98);
                color: white;
            }
            
            .love-message {
                color: #ddd;
            }
        }
        
        /* ===== SAFE AREA INSETS FOR NOTCH ===== */
        @supports (padding: max(0px)) {
            .btn-yes {
                bottom: max(20px, env(safe-area-inset-bottom));
            }
            
            .distance-indicator {
                top: max(10px, env(safe-area-inset-top));
                right: max(10px, env(safe-area-inset-right));
            }
            
            .score-board {
                top: max(10px, env(safe-area-inset-top));
                left: max(10px, env(safe-area-inset-left));
            }
        }
        
        /* ===== PERFORMANCE OPTIMIZATION ===== */
        .will-change-transform {
            will-change: transform;
        }
        
        .will-change-opacity {
            will-change: opacity;
        }
        
        /* ===== REDUCE MOTION PREFERENCE ===== */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- LANDING PAGE -->
    <div class="landing-page" id="landingPage">
        
        <!-- Floating Hearts Background -->
        <div class="floating-hearts" id="floatingHearts"></div>
        
        <!-- Main Card -->
        <div class="love-card">
            <div class="photo-wrapper">
                <div class="photo-3d">
                    <i class="fas fa-heart" id="mainHeart"></i>
                </div>
                <div class="photo-ring"></div>
            </div>
            
            <h1 class="greeting-title">Untukmu,</h1>
            <span class="name-highlight">Jelita Restianty</span>
            
            <div class="love-message">
                ❤️ Sebelum masuk, coba kejar tombol NO dulu ❤️
            </div>
            
            <div class="question">
                Apakah kamu sayang aku?
            </div>
        </div>
        
        <!-- Distance Indicator -->
        <div class="distance-indicator" id="distanceIndicator">
            <i class="fas fa-heart"></i> Jarak: 100%
        </div>
        
        <!-- Score Board -->
        <div class="score-board" id="scoreBoard">
            <i class="fas fa-running"></i>
            <span id="fleeCount">0</span> Kali Lari
        </div>
        
        <!-- YES Button -->
        <button class="btn-yes" onclick="enterWebsite()" id="yesBtn">
            <i class="fas fa-heart"></i>
            YES, I LOVE YOU
            <i class="fas fa-heart"></i>
        </button>
        
        <!-- NO Button -->
        <button class="btn-no" id="noBtn">
            <i class="fas fa-times"></i>
            NO
            <i class="fas fa-times"></i>
        </button>
        
        <!-- Footer -->
        <div class="romantic-footer">
            <i class="fas fa-heart"></i>
            <span>Kejar NO, Klik YES!</span>
            <i class="fas fa-heart"></i>
        </div>
        
        <!-- Loading -->
        <div class="loading-container" id="loadingContainer">
            <div class="loading-bar">
                <div class="loading-fill" id="loadingFill"></div>
            </div>
            <div class="loading-text" id="loadingText">Yeay! Akhirnya milih YES ❤️</div>
        </div>
    </div>
    
    <!-- Tooltip -->
    <div id="tooltip" class="tooltip" style="display: none;"></div>
    
    <script>
        (function() {
            'use strict';
            
            // ===== 120FPS OPTIMIZATION =====
            const RAF = window.requestAnimationFrame || 
                       window.webkitRequestAnimationFrame || 
                       function(cb) { setTimeout(cb, 1000 / 60); };
            
            // ===== DOM ELEMENTS =====
            const landingPage = document.getElementById('landingPage');
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const tooltip = document.getElementById('tooltip');
            const distanceIndicator = document.getElementById('distanceIndicator');
            const scoreBoard = document.getElementById('scoreBoard');
            const fleeCountSpan = document.getElementById('fleeCount');
            const floatingHearts = document.getElementById('floatingHearts');
            const mainHeart = document.getElementById('mainHeart');
            
            // ===== GAME VARIABLES =====
            let mouseX = 0, mouseY = 0;
            let touchX = 0, touchY = 0;
            let noBtnX = window.innerWidth - 250;
            let noBtnY = window.innerHeight / 2;
            let fleeCount = 0;
            let isNear = false;
            let animationFrame = null;
            
            // ===== CONSTANTS =====
            const FLEE_DISTANCE = 180;
            const FLEE_SPEED = 12;
            
            // ===== INITIAL POSITION =====
            function initPosition() {
                noBtnX = window.innerWidth - Math.min(300, window.innerWidth * 0.3);
                noBtnY = window.innerHeight / 2;
                updateNoButtonPosition();
            }
            
            // ===== UPDATE NO BUTTON POSITION =====
            function updateNoButtonPosition() {
                if (!noBtn) return;
                
                const btnWidth = noBtn.offsetWidth || 180;
                const btnHeight = noBtn.offsetHeight || 60;
                
                noBtnX = Math.max(10, Math.min(noBtnX, window.innerWidth - btnWidth - 10));
                noBtnY = Math.max(10, Math.min(noBtnY, window.innerHeight - btnHeight - 10));
                
                noBtn.style.left = noBtnX + 'px';
                noBtn.style.top = noBtnY + 'px';
                noBtn.style.transform = 'translateZ(0)';
            }
            
            // ===== TRACK INPUT POSITION =====
            function trackPosition(e) {
                e.preventDefault();
                
                if (e.touches) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                } else {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                }
                
                if (!animationFrame) {
                    animationFrame = RAF(updateGame);
                }
            }
            
            // ===== UPDATE GAME LOOP =====
            function updateGame() {
                const btnCenterX = noBtnX + (noBtn.offsetWidth / 2);
                const btnCenterY = noBtnY + (noBtn.offsetHeight / 2);
                
                const distance = Math.hypot(mouseX - btnCenterX, mouseY - btnCenterY);
                
                // Update UI
                const percentage = Math.min(100, Math.max(0, Math.round((distance / 300) * 100)));
                distanceIndicator.innerHTML = `<i class="fas fa-heart"></i> Jarak: ${percentage}%`;
                
                if (distance < FLEE_DISTANCE) {
                    distanceIndicator.style.background = 'rgba(255,0,0,0.4)';
                    noBtn.classList.add('fleeing');
                    
                    if (!isNear) {
                        isNear = true;
                        showTooltip('Jangan dekati NO! 🏃‍♂️', mouseX, mouseY);
                    }
                    
                    // Flee from input
                    const angle = Math.atan2(btnCenterY - mouseY, btnCenterX - mouseX);
                    const speedMultiplier = Math.max(1, (FLEE_DISTANCE - distance) / 40);
                    
                    noBtnX += Math.cos(angle) * FLEE_SPEED * speedMultiplier;
                    noBtnY += Math.sin(angle) * FLEE_SPEED * speedMultiplier;
                    
                    fleeCount++;
                    fleeCountSpan.textContent = fleeCount;
                    
                    // Grow YES button
                    if (fleeCount <= 30) {
                        const scale = 1 + Math.min(fleeCount * 0.02, 0.8);
                        yesBtn.style.transform = `translateX(-50%) scale(${scale})`;
                    }
                    
                    // Trail effect
                    if (fleeCount % 3 === 0) {
                        createTrail(btnCenterX, btnCenterY);
                    }
                    
                } else {
                    distanceIndicator.style.background = 'rgba(255,255,255,0.2)';
                    noBtn.classList.remove('fleeing');
                    isNear = false;
                }
                
                updateNoButtonPosition();
                animationFrame = null;
            }
            
            // ===== SHOW TOOLTIP =====
            function showTooltip(message, x, y) {
                tooltip.style.display = 'block';
                tooltip.innerHTML = `<i class="fas fa-heart"></i> ${message} <i class="fas fa-heart"></i>`;
                tooltip.style.left = Math.max(10, Math.min(x - 120, window.innerWidth - 200)) + 'px';
                tooltip.style.top = (y - 70) + 'px';
                
                setTimeout(() => {
                    tooltip.style.display = 'none';
                }, 1000);
            }
            
            // ===== CREATE TRAIL EFFECT =====
            function createTrail(x, y) {
                const trail = document.createElement('div');
                trail.className = 'trail-particle';
                trail.style.left = x + 'px';
                trail.style.top = y + 'px';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 500);
            }
            
            // ===== PREVENT NO BUTTON CLICK =====
            noBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                noBtnX += (Math.random() - 0.5) * 200;
                noBtnY += (Math.random() - 0.5) * 200;
                updateNoButtonPosition();
                
                showTooltip('Nggak bisa di-click! 😘', 
                    noBtnX + noBtn.offsetWidth/2, 
                    noBtnY + noBtn.offsetHeight/2
                );
                
                fleeCount++;
                fleeCountSpan.textContent = fleeCount;
            });
            
            // ===== CREATE FLOATING HEARTS =====
            function createFloatingHearts() {
                for (let i = 0; i < 25; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('i');
                        heart.className = 'fas fa-heart heart-particle';
                        heart.style.left = Math.random() * 100 + '%';
                        heart.style.animationDelay = (Math.random() * 10) + 's';
                        heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                        floatingHearts.appendChild(heart);
                    }, i * 30);
                }
            }
            
            // ===== HEART ANIMATION =====
            function animateHeart() {
                let scale = 1;
                let increasing = true;
                
                function update() {
                    if (increasing) {
                        scale += 0.02;
                        if (scale >= 1.2) increasing = false;
                    } else {
                        scale -= 0.02;
                        if (scale <= 0.9) increasing = true;
                    }
                    mainHeart.style.transform = `scale(${scale})`;
                    RAF(update);
                }
                RAF(update);
            }
            
            // ===== ENTER WEBSITE =====
            window.enterWebsite = function() {
                const loadingContainer = document.getElementById('loadingContainer');
                const loadingFill = document.getElementById('loadingFill');
                const loadingText = document.getElementById('loadingText');
                
                loadingContainer.style.display = 'block';
                
                let progress = 0;
                const messages = [
                    'Yeay! Akhirnya milih YES ❤️',
                    'Kamu benar, aku sayang kamu!',
                    'Menyiapkan kejutan spesial...',
                    'Siap-siap baper!',
                    'Loading cinta 100% ❤️'
                ];
                
                const interval = setInterval(() => {
                    progress += 2;
                    loadingFill.style.width = progress + '%';
                    
                    const messageIndex = Math.floor((progress / 100) * messages.length);
                    if (messageIndex < messages.length) {
                        loadingText.innerHTML = messages[messageIndex];
                    }
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        landingPage.style.transition = 'opacity 0.5s ease';
                        landingPage.style.opacity = '0';
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    }
                }, 10);
            };
            
            // ===== EVENT LISTENERS =====
            document.addEventListener('mousemove', trackPosition);
            document.addEventListener('touchmove', trackPosition, { passive: false });
            document.addEventListener('touchstart', trackPosition);
            
            document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            
            window.addEventListener('resize', () => {
                initPosition();
            });
            
            // ===== INIT =====
            window.onload = function() {
                createFloatingHearts();
                animateHeart();
                initPosition();
                
                // Touch optimization
                document.body.style.touchAction = 'none';
            };
            
        })();
    </script>
</body>
</html>
